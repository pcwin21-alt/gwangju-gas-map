name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'output/map.html'
      - 'output/gas_stations.json'
      - 'output/gas_prices.json'
      - 'thumbnail.png'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy map.html as index.html
        run: cp output/map.html index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,output,docs,.claude,.env,requirements.txt,env.example'
